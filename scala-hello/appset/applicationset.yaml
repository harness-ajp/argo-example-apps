apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: pipelines-appsets-argocd-rollouts
spec:
  generators:
  - git:
      repoURL: git@github.com:harness-ajp/argo-example-apps.git
      revision: HEAD
      files:
      - path: "scala-hello/cluster-config/backend/config.json"
  template:
    metadata:
      name: '{{.environment}}-scala-hello-world'
      labels:
        harness.io/envRef: '{{.environment}}'
        harness.io/serviceRef: '{{.harness_service}}'
        harness.io/buildRef: '{{.image_tag}}'
    spec:
      project: default
      source:
        repoURL: git@github.com:harness-ajp/argo-example-apps.git
        targetRevision: HEAD
        path: "scala-hello/base"
        kustomize:
          images:
          - ajpahl1008/scala-hello-world-backend:{{.image_tag}}
      destination:
        server: '{{.server_address}}'
        namespace: 'scala-apps-{{.environment}}'
      syncPolicy:
        automated:
          selfHeal: true
        syncOptions:
        - PruneLast=true
        - CreateNamespace=true
        - ApplyOutOfSyncOnly=true
