---
# Backend Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: scala-backend
  labels:
    app: scala-hello-world
    component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: scala-hello-world
      component: backend
  template:
    metadata:
      labels:
        app: scala-hello-world
        component: backend
    spec:
      containers:
      - name: backend
        image: docker.io/ajpahl1008/scala-hello-world-backend:11
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        env:
        - name: PORT
          value: "8080"
        - name: JAVA_OPTS
          value: "-Xmx512m -Xms256m"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/status
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
---
# Backend Service
apiVersion: v1
kind: Service
metadata:
  name: scala-backend
  labels:
    app: scala-hello-world
    component: backend
spec:
  type: ClusterIP
  ports:
  - port: 8080
    targetPort: 8080
    protocol: TCP
    name: http
  selector:
    app: scala-hello-world
    component: backend
---
# Frontend Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: scala-frontend
  labels:
    app: scala-hello-world
    component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: scala-hello-world
      component: frontend
  template:
    metadata:
      labels:
        app: scala-hello-world
        component: frontend
    spec:
      containers:
      - name: frontend
        image: docker.io/ajpahl1008/scala-hello-world-frontend:11
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
          name: http
          protocol: TCP
        env:
        - name: PORT
          value: "3000"
        - name: JAVA_OPTS
          value: "-Xmx256m -Xms128m"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "250m"
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5
---
# Frontend Service
apiVersion: v1
kind: Service
metadata:
  name: scala-frontend
  labels:
    app: scala-hello-world
    component: frontend
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 3000
    protocol: TCP
    name: http
  selector:
    app: scala-hello-world
    component: frontend
